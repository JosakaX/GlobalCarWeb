{% extends "base.html" %}

{% block content %}
<!-- Search Header -->
<section class="bg-[#001736] pt-32 pb-16 relative overflow-hidden">
    <!-- Decoración de fondo -->
    <div class="absolute top-0 right-0 w-[50vw] h-[50vw] bg-gc-blue/20 rounded-full blur-[100px] pointer-events-none -translate-y-1/2 translate-x-1/2"></div>
    <div class="absolute bottom-0 left-0 w-[40vw] h-[40vw] bg-gc-orange/10 rounded-full blur-[100px] pointer-events-none translate-y-1/2 -translate-x-1/2"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-white mb-4 drop-shadow-lg tracking-tighter">Catálogo de Vehículos</h1>
        <p class="text-lg text-gray-300 font-bold mb-10 tracking-[0.1em] uppercase">Encuentra el auto de tus sueños</p>

        <!-- Glassmorphism Search Bar -->
        <div class="w-full max-w-4xl mx-auto bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-2 flex flex-col md:flex-row items-center justify-between shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] relative">
            <div class="flex items-center w-full md:w-3/5 px-6 py-4 border-b md:border-b-0 md:border-r border-white/20 group z-10">
                <svg class="w-6 h-6 text-white/80 group-focus-within:text-white transition-colors mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input id="hero-search-input" type="text" placeholder="Buscar modelos..." autocomplete="off" class="bg-transparent text-white placeholder-white/70 w-full outline-none text-lg font-medium tracking-wide">
            </div>

            <div class="flex items-center w-full md:w-2/5 px-6 py-4 justify-between z-10">
                <div class="relative w-full max-w-[150px]">
                    <select id="hero-search-select" class="bg-transparent text-white w-full outline-none appearance-none cursor-pointer text-base font-bold tracking-wide">
                        <option class="text-black font-medium" value="">Todas las Marcas</option>
                    </select>
                    <svg class="w-4 h-4 absolute right-0 top-1.5 text-white/80 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                
                <button id="hero-search-button" class="bg-gradient-to-r from-gc-orange to-[#ff4500] border border-[#ff8c42] text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest hover:shadow-[0_0_20px_rgba(255,102,0,0.8)] hover:scale-105 transition-all outline-none text-sm">
                    Buscar
                </button>
            </div>
        </div>
    </div>
</section>

<!-- Brand Filter Pills (Horizontal Scrollable Premium) -->
<section class="py-8 bg-gradient-to-b from-gray-100 to-white overflow-hidden relative border-y border-gray-300 shadow-inner z-20">
    <!-- Subtle metallic noise overlay -->
    <div class="absolute inset-0 bg-[#e0e5ec] opacity-60 mix-blend-multiply pointer-events-none"></div>
    
    <div class="max-w-7xl mx-auto px-4 relative z-10 flex flex-col md:flex-row items-center gap-6">
        
        <!-- Static 'Todos' Option -->
        <button onclick="window.searchByBrand('')" class="flex-shrink-0 bg-[#002f6c] hover:bg-[#ff6600] rounded-full border-[3px] border-[#0047b3] shadow-[0_0_0_3px_#ff6600,0_4px_10px_rgba(0,0,0,0.2)] flex items-center justify-center min-w-[170px] h-[60px] px-6 relative overflow-hidden transition-colors cursor-pointer group z-30">
            <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent pointer-events-none rounded-full"></div>
            <span class="text-white font-black text-xl tracking-widest group-hover:scale-105 transition-transform">TODOS</span>
        </button>

        <!-- Container Slider Auto Scroll -->
        <div class="overflow-hidden w-full relative group">
            <div class="flex space-x-6 w-max animate-marquee py-6 pr-6" id="brand-scroll-area">
                <!-- Group 1 (JS Render) -->
                <div id="brand-scroll-group-1" class="flex space-x-6 w-max pr-6"></div>
                <!-- Group 2 (JS Render) -->
                <div id="brand-scroll-group-2" class="flex space-x-6 w-max pr-6" aria-hidden="true"></div>
            </div>
        </div>    
            <!-- Indicadores de fade visuales para el área escroleable -->
            <div class="pointer-events-none absolute inset-y-0 left-0 w-8 bg-gradient-to-r from-gray-100 to-transparent z-20"></div>
            <div class="pointer-events-none absolute inset-y-0 right-0 w-8 bg-gradient-to-l from-white to-transparent z-20"></div>
        </div>
    </div>
</section>
<style>
/* Hides scrollbar completely but keeps functionality */
.scrollbar-hide::-webkit-scrollbar {
    display: none;
}
.scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
}
</style>

<!-- Catálogo Grid -->
<section id="inventory" class="py-16 relative overflow-hidden bg-gradient-to-b from-[#f8f9fc] via-[#f0f3fa] to-[#e4e9f5] min-h-[500px]">
    <!-- Decorative Metallic Glass Shapes -->
    <div class="absolute lg:block -left-40 top-20 w-96 h-96 bg-gradient-to-tr from-white/40 to-white/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute lg:block right-0 bottom-0 w-[500px] h-[500px] bg-gradient-to-br from-[#0033a0]/5 to-[#ff6600]/5 rounded-full blur-3xl pointer-events-none translate-x-1/3 translate-y-1/3"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <!-- Grid de Vehículos -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 py-4 w-full" id="car-grid">
            <!-- Los vehículos se cargan dinámicamente desde la base de datos a través de main.js -->
            <!-- Placeholder mientras cargan los vehículos -->
            <div class="col-span-1 md:col-span-2 lg:col-span-3 flex justify-center items-center py-20 min-h-[300px]">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-gc-blue"></div>
            </div>
        </div>
    </div>
</section>

<!-- Modal Logic -->
<!-- Vehicle Carousel Modal -->
<div id="vehicle-carousel-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/95 backdrop-blur-md opacity-0 transition-opacity duration-300">
    <!-- Close Button -->
    <button type="button" class="absolute top-6 right-6 text-white hover:text-gc-orange transition-colors duration-200 z-[110] p-2 focus:outline-none" onclick="closeVehicleCarousel()">
        <svg class="w-10 h-10 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>
    
    <div class="relative w-full h-full md:w-[90vw] md:h-[90vh] flex flex-col justify-center items-center" id="vehicle-carousel-container">
        <!-- Touch Swipe Overlay -->
        <div class="absolute inset-0 z-10 cursor-grab active:cursor-grabbing" id="vc-touch-area" onclick="event.stopPropagation()"></div>

        <!-- Image Area -->
        <div class="relative w-full h-full max-h-[85vh] flex items-center justify-center overflow-hidden pointer-events-none">
            <img id="vc-main-image" src="" class="max-w-full max-h-[80vh] md:max-h-full object-contain rounded-lg shadow-[0_20px_60px_rgba(0,0,0,0.8)] transition-opacity duration-200" alt="Vehicle Image">
            
            <!-- Prev Button -->
            <button onclick="vcPrevImage(event)" class="absolute left-4 md:left-10 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-gc-blue text-white w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center backdrop-blur-sm transition-all shadow-lg z-20 outline-none pointer-events-auto border border-white/20">
                <svg class="w-6 h-6 md:w-8 md:h-8 mr-1 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            
            <!-- Next Button -->
            <button onclick="vcNextImage(event)" class="absolute right-4 md:right-10 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-gc-blue text-white w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center backdrop-blur-sm transition-all shadow-lg z-20 outline-none pointer-events-auto border border-white/20">
                <svg class="w-6 h-6 md:w-8 md:h-8 ml-1 md:ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <!-- Thumbnails / Dots -->
        <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-4 z-20 pointer-events-auto" id="vc-dots-container">
            <!-- Inject dots via JS -->
        </div>
    </div>
</div>

</div>

{% endblock %}

{% block scripts %}
{% endblock %}
